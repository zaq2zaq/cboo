<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>商家工作台 · 楚宝女鞋</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 项目样式 (CDN) 动态强制更新 -->
    <script>
        (function() {
            const timestamp = Date.now();
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `https://cdn.jsdelivr.net/gh/zaq2zaq/cb@main/cbcss.css?t=${timestamp}`;
            document.head.appendChild(link);
        })();
    </script>
    <!-- Vue 3 导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
            }
        }
    </script>
    <style>
        /* 后备基础样式，以防 CDN 加载延迟 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f2f5f9; margin: 0; padding: 0; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak></div>
    <script type="module">
        // 动态生成带时间戳的导入 URL，强制更新缓存
        const timestamp = Date.now();
        const appModuleUrl = `https://cdn.jsdelivr.net/gh/zaq2zaq/cb@main/app.js?t=${timestamp}`;
        
        import(appModuleUrl).then(module => {
            module.mountApp('#app');
        }).catch(err => {
            console.error('应用加载失败:', err);
            document.getElementById('app').innerHTML = '<div style="padding: 20px; text-align: center;">应用加载失败，请刷新页面或检查网络。</div>';
        });
    </script>
</body>
</html>
